<svg xmlns="http://www.w3.org/2000/svg" width="240" height="64" viewBox="0 0 240 64">

  <!-- Background -->
  <rect width="240" height="64" rx="32" fill="#16213e"/>

  <!-- Slides icon -->
  <g transform="translate(70,32)">
    <!-- board -->
    <rect x="-16" y="-11" width="32" height="18" rx="3" fill="white"/>
    <!-- stand -->
    <line x1="0" y1="7" x2="0" y2="14" stroke="white" stroke-width="2"/>
    <line x1="-8" y1="14" x2="8" y2="14" stroke="white" stroke-width="2"/>
    <!-- content -->
    <line x1="-10" y1="-5" x2="10" y2="-5" stroke="#16213e" stroke-width="1.8"/>
    <line x1="-10" y1="1" x2="6" y2="1" stroke="#16213e" stroke-width="1.8"/>
  </g>

  <!-- Text -->
  <text x="155" y="34"
        dominant-baseline="middle"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Arial, sans-serif"
        font-size="30"
        fill="white"
        font-weight="600"
        letter-spacing="0.3">
    Slides
  </text>

</svg>
